<!DOCTYPE html>
<html lang="id" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Request MIS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { dark: '#0f172a', 'dark-lighter': '#1e293b' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .glass {
            @apply bg-white/80 dark:bg-slate-900/70 backdrop-blur-md;
        }

        .status-badge {
            @apply px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider border transition-all;
        }
    </style>
</head>

<body class="bg-slate-50 dark:bg-dark text-slate-800 dark:text-slate-200 min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1
                    class="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-violet-600 dark:from-indigo-400 dark:to-violet-400">
                    Request Monitor MIS
                </h1>
                <p class="text-slate-500 dark:text-slate-400 text-sm mt-1 font-medium">Monitoring Progres Pekerjaan</p>
            </div>
            <div class="flex flex-wrap items-center gap-3 w-full md:w-auto">
                <button onclick="toggleTheme()"
                    class="p-3 rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-dark-lighter shadow-sm transition-all hover:scale-105 active:scale-95"
                    title="Dark/Light Mode">
                    <svg id="themeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"></svg>
                </button>
                <button onclick="goToBast()"
                    class="px-6 py-3 rounded-2xl bg-emerald-600 text-white text-sm font-bold hover:bg-emerald-500 shadow-lg uppercase tracking-wider transition-all hover:scale-105 active:scale-95">
                    BAST
                </button>
                <button onclick="goToHome()"
                    class="flex-1 md:flex-none px-6 py-3 rounded-2xl bg-indigo-600 text-white text-sm font-bold hover:bg-indigo-500 shadow-lg uppercase tracking-wider transition-all hover:scale-105 active:scale-95">
                    Request Baru
                </button>
            </div>
        </header>

        <main class="glass rounded-3xl border border-slate-200 dark:border-slate-800 shadow-2xl overflow-hidden">
            <div
                class="p-6 border-b border-slate-200 dark:border-slate-800 flex flex-col md:flex-row gap-4 items-center justify-between">
                <div class="relative w-full md:w-[28rem] flex gap-3">
                    <div class="relative flex-1">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                        </span>
                        <input type="text" id="searchInput" onkeyup="filterTable()"
                            placeholder="Cari PIC, Unit, atau Status..."
                            class="w-full pl-10 pr-4 py-2.5 bg-slate-100 dark:bg-dark/50 border border-transparent focus:border-indigo-500 rounded-xl outline-none text-sm transition-all shadow-sm">
                    </div>
                    <select id="statusFilter" onchange="filterTable()"
                        class="bg-slate-100 dark:bg-dark/50 border border-transparent focus:border-indigo-500 rounded-xl px-4 py-2.5 outline-none text-sm font-semibold text-slate-700 dark:text-slate-300 shadow-sm cursor-pointer transition-all">
                        <option value="active">Aktif Saja</option>
                        <option value="all">Semua Status</option>
                    </select>
                </div>
                <div id="fetchStatus"
                    class="text-[10px] font-bold uppercase tracking-wider text-slate-400 flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></div>
                    Menghubungkan...
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse" id="requestTable">
                    <thead>
                        <tr class="bg-slate-50/50 dark:bg-dark-lighter/30 text-slate-500 dark:text-slate-400">
                            <th class="px-6 py-4 text-xs font-bold uppercase">Req ID</th>
                            <th class="px-6 py-4 text-xs font-bold uppercase">Tanggal</th>
                            <th class="px-6 py-4 text-xs font-bold uppercase">Unit / Dept</th>
                            <th class="px-6 py-4 text-xs font-bold uppercase">PIC</th>
                            <th class="px-6 py-4 text-xs font-bold uppercase">Tipe</th>
                            <th class="px-6 py-4 text-xs font-bold uppercase text-center">Status</th>
                            <th class="px-6 py-4 text-xs font-bold uppercase">Progress</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-200 dark:divide-slate-800" id="tableBody">
                        <!-- Data ditarik oleh fetchData -->
                    </tbody>
                </table>
            </div>
            
            <!-- Pagination Controls -->
            <div class="p-4 border-t border-slate-200 dark:border-slate-800 flex items-center justify-between text-sm">
                <div id="pageInfo" class="text-slate-500 dark:text-slate-400 font-medium">Halaman 1 dari 1</div>
                <div class="flex gap-2">
                    <button onclick="changePage(-1)" id="prevBtn" disabled
                        class="px-4 py-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 font-bold disabled:opacity-50 hover:bg-slate-200 dark:hover:bg-slate-700 transition">
                        Sebelumnya
                    </button>
                    <button onclick="changePage(1)" id="nextBtn" disabled
                        class="px-4 py-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 font-bold disabled:opacity-50 hover:bg-slate-200 dark:hover:bg-slate-700 transition">
                        Selanjutnya
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbwRip2IAXotGi-dtyKLVNV4JIpJmhpBurHUtAhI0pZjK4Kayi6FbeSku2tUyVz471qWOg/exec'; // TODO: Update Endpoint
        let allData = [];
        let filteredData = [];
        let currentPage = 1;
        const itemsPerPage = 15;

        window.onload = function () {
            updateThemeIcon();
            fetchData();
        };

        function formatDateDisplay(dateVal) {
            if (!dateVal) return '-';
            const months = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agu", "Sep", "Okt", "Nov", "Des"];
            let d = new Date(dateVal);
            if (isNaN(d.getTime())) return dateVal;
            const day = String(d.getDate()).padStart(2, '0');
            const month = months[d.getMonth()];
            const year = d.getFullYear();
            return `${day} ${month} ${year}`;
        }

        function fetchData() {
            const fetchStatus = document.getElementById('fetchStatus');
            fetch(GAS_API_URL + '?action=listReq')
                .then(r => r.json())
                .then(res => {
                    if (res.status === 'Success') {
                        allData = processAndSortData(res.data);
                        filterTable();
                        fetchStatus.innerHTML = '<span class="text-emerald-500 font-bold">● Database Terhubung</span>';
                    } else {
                        fetchStatus.innerHTML = '<span class="text-red-500 font-bold">● Gagal (API Error)</span>';
                    }
                })
                .catch(err => {
                    fetchStatus.innerHTML = '<span class="text-red-500 font-bold">● Gagal Menghubungkan</span>';
                    // Mock preview fallback
                    setTimeout(() => {
                        allData = processAndSortData([{
                            id: 'REQ-123', date: new Date().toISOString(), unit: 'Pusat', departemen: 'MIS',
                            pic: 'Anom', position: 'MIS Staff', type: 'Sistem', scale: 'Seluruh',
                            status: 'Selesai', progress: 100, purpose: 'Preview.', remarks: 'Done.', bastStatus: 'Approved'
                        }]);
                        filterTable();
                        fetchStatus.innerHTML = '<span class="text-blue-500">● Mode Preview</span>';
                    }, 800);
                });
        }

        function processAndSortData(data) {
            return data.sort((a, b) => {
                const sA = (a.status || '').toLowerCase();
                const sB = (b.status || '').toLowerCase();
                const doneA = sA.includes('selesai') || sA.includes('done');
                const doneB = sB.includes('selesai') || sB.includes('done');
                
                if (doneA && !doneB) return 1;
                if (!doneA && doneB) return -1;
                return 0; // maintain relative API order
            });
        }

        function renderPage() {
            const body = document.getElementById('tableBody');
            body.innerHTML = '';

            if (!filteredData || filteredData.length === 0) {
                body.innerHTML = '<tr><td colspan="7" class="px-6 py-10 text-center text-slate-400 italic">Data tidak ditemukan.</td></tr>';
                document.getElementById('pageInfo').innerText = `Halaman 1 dari 1`;
                document.getElementById('prevBtn').disabled = true;
                document.getElementById('nextBtn').disabled = true;
                return;
            }

            const totalPages = Math.ceil(filteredData.length / itemsPerPage);
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = Math.min(startIndex + itemsPerPage, filteredData.length);
            const pageData = filteredData.slice(startIndex, endIndex);

            pageData.forEach(item => {
                const row = document.createElement('tr');
                row.className = "hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors group";

                const statusStyle = getStatusStyles(item.status);
                const displayDate = formatDateDisplay(item.date);
                const remarksTooltip = item.remarks ? `${item.remarks}` : `Status: ${item.status}`;
                const purposeTooltip = item.purpose ? `${item.purpose}` : 'Tujuan tidak diisi';

                let bastAction = '';
                if (item.bastNoSurat) {
                    bastAction = `<div class="text-[10px] text-emerald-600 dark:text-emerald-400 mt-1 font-semibold uppercase tracking-wider">${item.bastStatus || 'BAST Progress'}</div>`;
                }

                row.innerHTML = `
                <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-slate-700 dark:text-slate-300">
                    ${item.id || ''}
                    ${bastAction}
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500 dark:text-slate-400">${displayDate}</td>
                <td class="px-6 py-4 whitespace-nowrap">
                    <div class="text-sm font-bold text-slate-900 dark:text-white">${item.unit}</div>
                    <div class="text-[10px] text-slate-400 uppercase">${item.departemen}</div>
                </td>
                <td class="px-6 py-4 whitespace-nowrap">
                    <div class="text-sm font-semibold text-slate-700 dark:text-slate-200">${item.pic}</div>
                    <div class="text-[10px] text-indigo-500 italic font-medium">${item.position || '-'}</div>
                </td>
                <td class="px-6 py-4">
                    <div class="text-sm font-bold text-slate-900 dark:text-white cursor-help decoration-dotted underline-offset-4 decoration-slate-300" title="${item.scale || '-'}">
                        ${item.type}
                    </div>
                    <div class="text-[10px] text-slate-400 opacity-80 truncate max-w-[180px] cursor-help" title="${purposeTooltip}">
                        ${item.purpose || ''}
                    </div>
                </td>
                <td class="px-6 py-4 text-center">
                    <span class="status-badge ${statusStyle} cursor-help shadow-sm group-hover:shadow-md" title="${remarksTooltip}">
                        ${item.status || 'Pending'}
                    </span>
                </td>
                <td class="px-6 py-4 whitespace-nowrap">
                    <div class="flex items-center gap-3">
                        <div class="flex-1 bg-slate-200 dark:bg-slate-800 rounded-full h-2 min-w-[70px] overflow-hidden">
                            <div class="bg-gradient-to-r from-indigo-500 to-indigo-400 h-full rounded-full transition-all duration-1000" style="width: ${item.progress}%"></div>
                        </div>
                        <span class="text-[10px] font-bold text-slate-500 dark:text-slate-400 w-8">${item.progress}%</span>
                    </div>
                </td>
            `;
                body.appendChild(row);
            });

            document.getElementById('pageInfo').innerText = `Halaman ${currentPage} dari ${totalPages}`;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages;
        }

        function changePage(delta) {
            currentPage += delta;
            renderPage();
        }

        function getStatusStyles(status) {
            const s = (status || '').toLowerCase();
            if (s.includes('done') || s.includes('selesai')) return 'bg-emerald-500/10 text-emerald-600 border-emerald-500/20';
            if (s.includes('progress')) return 'bg-blue-500/10 text-blue-600 border-blue-500/20';
            if (s.includes('testing')) return 'bg-purple-500/10 text-purple-600 border-purple-500/20';
            if (s.includes('reject')) return 'bg-red-500/10 text-red-600 border-red-500/20';
            return 'bg-amber-500/10 text-amber-600 border-amber-500/20';
        }

        function filterTable() {
            const query = document.getElementById("searchInput").value.toLowerCase();
            const viewMode = document.getElementById("statusFilter").value; // 'active' or 'all'

            filteredData = allData.filter(item => {
                const s = (item.status || '').toLowerCase();
                const isCanceled = s.includes('cancel') || s.includes('reject');
                const isFinished = (s.includes('done') || s.includes('selesai')) && item.bastStatus === 'Approved';
                
                // Hide implicitly if viewMode is 'active' and search is empty
                let isHidden = false;
                if (query === '' && viewMode === 'active') {
                    if (isCanceled || isFinished) isHidden = true;
                }

                if (isHidden) return false;

                if (query !== '') {
                    return (item.pic || '').toLowerCase().includes(query) ||
                        (item.unit || '').toLowerCase().includes(query) ||
                        (item.status || '').toLowerCase().includes(query) ||
                        (item.departemen || '').toLowerCase().includes(query) ||
                        (item.type || '').toLowerCase().includes(query) ||
                        (item.id || '').toLowerCase().includes(query);
                }
                
                return true; // passthrough
            });

            currentPage = 1;
            renderPage();
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const isDark = document.documentElement.classList.contains('dark');
            const icon = document.getElementById('themeIcon');
            if (isDark) {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z"></path>';
            } else {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path>';
            }
        }

        function goToHome() {
            window.location.href = 'req.html';
        }

        function goToBast() {
            window.location.href = 'bast.html';
        }
    </script>
</body>

</html>
