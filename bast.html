<!DOCTYPE html>
<html lang="id" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIS BAST System</title>
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#1e293b">
  <link rel="manifest"
    href="data:application/json;base64,ewogICJuYW1lIjogIk1JUyBCQVNUIFN5c3RlbSIsCiAgInNob3J0X25hbWUiOiAiQkFTVCIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjMWUyOTNiIiwKICAiaWNvbnMiOiBbCiAgICB7CiAgICAgICJzcmMiOiAiaHR0cHM6Ly9jZG4taWNvbnMtcG5nLmZyZWVwaWsuY29tLzI1Ni8xMTY0Ny8xMTY0NzYwNC5wbmciLAogICAgICAic2l6ZXMiOiAiMjU2eDI1NiIsCiAgICAgICJ0eXBlIjogImltYWdlL3BuZyIKICAgIH0KICBdCn0=">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            dark: '#0f172a',
            'dark-lighter': '#1e293b',
            accent: '#3b82f6'
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    body {
      font-family: 'Inter', sans-serif;
    }

    .glass {
      @apply bg-white/80 dark:bg-slate-900/70 backdrop-blur-md;
    }

    .loading-spinner {
      border: 3px solid rgba(0, 0, 0, 0.1);
      border-radius: 50%;
      border-top: 3px solid #3b82f6;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
    }

    .dark .loading-spinner {
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top: 3px solid #3b82f6;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    /* Smooth transition for theme switching */
    .theme-transition {
      transition: background-color 0.5s ease, border-color 0.5s ease, color 0.5s ease;
    }

    .header-link {
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .header-link:hover {
      opacity: 0.8;
      transform: translateY(-1px);
    }
  </style>
</head>

<body class="bg-slate-50 dark:bg-dark text-slate-800 dark:text-slate-200 min-h-screen theme-transition">

  <div class="max-w-5xl mx-auto p-4 md:p-8">
    <!-- Header -->
    <header class="flex justify-between items-center mb-10">
      <div>
        <!-- Link kembali ke Portal Request -->
        <a href="javascript:void(0)" onclick="goToRequest()" class="header-link inline-block">
          <h1
            class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-emerald-600 dark:from-blue-400 dark:to-emerald-400">
            BAST Dashboard
          </h1>
        </a>
        <p class="text-slate-500 dark:text-slate-400 text-sm mt-1 font-medium">Sistem Administrasi Serah Terima Digital
        </p>
      </div>

      <div class="flex items-center gap-4">
        <!-- Theme Toggle Button -->
        <button onclick="toggleTheme()"
          class="p-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-dark-lighter shadow-sm hover:bg-slate-100 dark:hover:bg-slate-800 transition-all text-slate-600 dark:text-yellow-400"
          title="Ganti Tema">
          <svg id="sunIcon" class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z">
            </path>
          </svg>
          <svg id="moonIcon" class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path>
          </svg>
        </button>

        <div class="hidden md:block">
          <span
            class="px-3 py-1 rounded-full border border-slate-200 dark:border-slate-700 text-[10px] font-bold text-slate-500 dark:text-slate-500 uppercase tracking-widest bg-white dark:bg-transparent shadow-sm">Workspace
            Integrated</span>
        </div>
      </div>
    </header>

    <div
      class="glass p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm mb-6 flex gap-4 transition-all">
      <input type="text" id="searchReqId" placeholder="Masukkan ID Request (Misal: REQ-12345)"
        class="flex-1 bg-white dark:bg-dark/50 border border-slate-200 dark:border-slate-700 rounded-xl p-3 text-slate-900 dark:text-white focus:border-blue-500 outline-none transition-all shadow-inner">
      <button type="button" onclick="searchReq()"
        class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3 px-6 rounded-xl shadow-md transition-all active:scale-95 flex items-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>
        Cari
      </button>
    </div>

    <form id="bastForm" onsubmit="handleFormSubmit(event)" class="grid grid-cols-1 lg:grid-cols-12 gap-6">
      <input type="hidden" name="reqId" id="reqIdInput">
      <!-- Left Column: Primary Data -->
      <div class="lg:col-span-7 space-y-6">
        <section
          class="glass p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-xl dark:shadow-2xl theme-transition">
          <h2 class="text-lg font-semibold mb-6 flex items-center gap-2 text-blue-600 dark:text-blue-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
              </path>
            </svg>
            Detail Dokumen & Aplikasi
          </h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="md:col-span-2">
              <label
                class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5 block">Nomor
                Surat BAST</label>
              <input type="text" name="noSurat" placeholder="BAST/001/MIS/XI/2025"
                class="w-full bg-white dark:bg-dark/50 border border-slate-200 dark:border-slate-700 rounded-xl p-3 text-slate-900 dark:text-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all shadow-sm"
                required>
            </div>
            <div class="md:col-span-2">
              <label
                class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5 block">Perihal
                / Nama Sistem</label>
              <input type="text" name="perihal" placeholder="Aplikasi Inventory Gudang v1.0"
                class="w-full bg-white dark:bg-dark/50 border border-slate-200 dark:border-slate-700 rounded-xl p-3 text-slate-900 dark:text-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all shadow-sm"
                required>
            </div>
            <div class="md:col-span-2">
              <label
                class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5 block">URL
                Aplikasi (Link Akses)</label>
              <input type="url" name="urlApp" placeholder="https://apps.company.com/inventory"
                class="w-full bg-white dark:bg-dark/50 border border-slate-200 dark:border-slate-700 rounded-xl p-3 text-slate-900 dark:text-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all shadow-sm"
                required>
            </div>
            <div class="md:col-span-2">
              <label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5 block">Fungsi Sistem</label>
              <input type="text" name="fungsi" placeholder="Fungsi Sistem / Departemen"
                class="w-full bg-white dark:bg-dark/50 border border-slate-200 dark:border-slate-700 rounded-xl p-3 text-slate-900 dark:text-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all shadow-sm"
                required>
            </div>
          </div>
        </section>

        <section
          class="glass p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-xl dark:shadow-2xl theme-transition">
          <h2 class="text-lg font-semibold mb-6 flex items-center gap-2 text-emerald-600 dark:text-emerald-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z">
              </path>
            </svg>
            Pihak Terkait (MIS & Requestor)
          </h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label
                class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5 block">Nama
                Pihak 1 (MIS)</label>
              <input type="text" name="nama1"
                class="w-full bg-white dark:bg-dark/50 border border-slate-200 dark:border-slate-700 rounded-xl p-3 focus:border-blue-500 outline-none transition-all mb-4 text-slate-900 dark:text-white shadow-sm"
                required>
              <label
                class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5 block">Email
                Pihak 1 (MIS)</label>
              <input type="email" name="email1"
                class="w-full bg-white dark:bg-dark/50 border border-slate-200 dark:border-slate-700 rounded-xl p-3 focus:border-blue-500 outline-none transition-all text-slate-900 dark:text-white shadow-sm"
                required>
            </div>
            <div>
              <label
                class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5 block">Atasan
                Pihak 1</label>
              <input type="text" name="atasan1"
                class="w-full bg-white dark:bg-dark/50 border border-slate-200 dark:border-slate-700 rounded-xl p-3 focus:border-blue-500 outline-none transition-all mb-4 text-slate-900 dark:text-white shadow-sm"
                required>
              <label
                class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5 block">Email
                Atasan Pihak 1</label>
              <input type="email" name="emailAtasan1"
                class="w-full bg-white dark:bg-dark/50 border border-slate-200 dark:border-slate-700 rounded-xl p-3 focus:border-blue-500 outline-none transition-all text-slate-900 dark:text-white shadow-sm"
                required>
            </div>
          </div>
        </section>
      </div>

      <!-- Right Column: Requestor Data -->
      <div class="lg:col-span-5 space-y-6">
        <section
          class="glass p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-xl dark:shadow-2xl h-fit theme-transition">
          <h2 class="text-lg font-semibold mb-6 flex items-center gap-2 text-purple-600 dark:text-purple-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
            </svg>
            Data Requestor (Pihak 2)
          </h2>
          <div class="space-y-4">
            <div
              class="p-4 bg-emerald-500/5 dark:bg-emerald-500/10 border border-emerald-500/20 dark:border-emerald-500/30 rounded-xl">
              <label
                class="text-xs font-bold text-emerald-700 dark:text-emerald-500 uppercase tracking-wider mb-1.5 block">Email
                Pihak 2 (Requestor) / Korporat</label>
              <input type="email" name="email2" placeholder="user@perusahaan.com"
                class="w-full bg-white dark:bg-dark/50 border border-emerald-500/30 rounded-xl p-3 text-slate-900 dark:text-white focus:ring-2 focus:ring-emerald-500 outline-none transition-all shadow-sm"
                required>
              <p class="text-[10px] text-emerald-600 dark:text-emerald-500/70 mt-2 font-medium italic">*Email ini akan
                menerima link approval unik.</p>
            </div>
            <div>
              <label
                class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5 block">Nama
                Lengkap</label>
              <input type="text" name="nama2"
                class="w-full bg-white dark:bg-dark/50 border border-slate-200 dark:border-slate-700 rounded-xl p-3 focus:border-blue-500 outline-none transition-all text-slate-900 dark:text-white shadow-sm"
                required>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label
                  class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5 block text-xs">Jabatan</label>
                <input type="text" name="jabatan2"
                  class="w-full bg-white dark:bg-dark/50 border border-slate-200 dark:border-slate-700 rounded-xl p-3 focus:border-blue-500 outline-none transition-all text-slate-900 dark:text-white shadow-sm"
                  required>
              </div>
              <div>
                <label
                  class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5 block text-xs">Divisi</label>
                <input type="text" name="divisi2"
                  class="w-full bg-white dark:bg-dark/50 border border-slate-200 dark:border-slate-700 rounded-xl p-3 focus:border-blue-500 outline-none transition-all text-slate-900 dark:text-white shadow-sm"
                  required>
              </div>
            </div>
            <div>
              <label
                class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5 block text-xs">Atasan
                Requestor</label>
              <input type="text" name="atasan2"
                class="w-full bg-white dark:bg-dark/50 border border-slate-200 dark:border-slate-700 rounded-xl p-3 focus:border-blue-500 outline-none transition-all mb-4 text-slate-900 dark:text-white shadow-sm"
                required>
              <label
                class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5 block text-xs">Email
                Atasan Requestor</label>
              <input type="email" name="emailAtasan2"
                class="w-full bg-white dark:bg-dark/50 border border-slate-200 dark:border-slate-700 rounded-xl p-3 focus:border-blue-500 outline-none transition-all text-slate-900 dark:text-white shadow-sm"
                required>
            </div>
          </div>
        </section>

        <input type="hidden" name="tanggal" id="tglInput">

        <button type="submit" id="submitBtn"
          class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-500 hover:to-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-500/20 dark:shadow-blue-900/20 transform active:scale-[0.98] transition-all flex items-center justify-center gap-3">
          <span id="btnText">PROSES & KIRIM APPROVAL</span>
          <div id="loader" class="loading-spinner hidden"></div>
        </button>

        <div id="statusBox" class="hidden p-4 rounded-xl text-sm font-bold border text-center animate-pulse"></div>
      </div>
    </form>

    <p class="mt-8 text-center text-xs text-slate-500 font-medium pb-8 lg:pb-0">
      MIS Request Portal © 2026
      <span onclick="previewPDF()" class="cursor-pointer text-slate-500 hover:text-indigo-500 transition-colors ml-1"
        title="Preview PDF Tersembunyi"> • BAST System</span>
    </p>
  </div>

  <script>
    document.getElementById('tglInput').value = new Date().toISOString();

    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbzLlyK1xKTBRS2TRvdY7Qtndwizt-mdkizBLnzzC-ULzQfrrNmuxDTgH4h56Uid-P4o/exec';

    window.onload = function () {
      const urlParams = new URLSearchParams(window.location.search);
      const id = urlParams.get('id');
      if (id) {
        document.getElementById('searchReqId').value = id;
        searchReq();
      }
    };

    function searchReq() {
      const reqId = document.getElementById('searchReqId').value;
      if (!reqId) return alert('Masukkan ID Request');
      const btn = document.querySelector('button[onclick="searchReq()"]');
      const originalText = btn.innerHTML;
      btn.innerHTML = 'Mencari...';
      btn.disabled = true;

      fetch(GAS_API_URL + '?action=getReq&id=' + encodeURIComponent(reqId))
        .then(r => r.json())
        .then(res => {
          btn.innerHTML = originalText;
          btn.disabled = false;
          if (res.status === 'Success') {
            document.getElementById('reqIdInput').value = res.data.id;
            const perihalEl = document.querySelector('[name="perihal"]');
            if (perihalEl) perihalEl.value = res.data.purpose || res.data.type;

            const noSuratEl = document.querySelector('[name="noSurat"]');
            if (noSuratEl) {
              noSuratEl.value = res.data.generatedBast || '';
              noSuratEl.readOnly = true;
              noSuratEl.className = "w-full bg-slate-100 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl p-3 text-slate-500 font-medium outline-none cursor-not-allowed";
            }

            const email2El = document.querySelector('[name="email2"]');
            if (email2El) email2El.value = res.data.emailReq || '';
            document.querySelector('[name="nama2"]').value = res.data.namaReq || res.data.pic || '';
            document.querySelector('[name="jabatan2"]').value = res.data.position || '';
            document.querySelector('[name="divisi2"]').value = res.data.departemen || '';

            if (res.data.perihal) document.querySelector('[name="perihal"]').value = res.data.perihal;
            if (res.data.fungsi) document.querySelector('[name="fungsi"]').value = res.data.fungsi;
            if (res.data.urlApp) document.querySelector('[name="urlApp"]').value = res.data.urlApp;

            if (res.data.nama1) document.querySelector('[name="nama1"]').value = res.data.nama1;
            if (res.data.email1) document.querySelector('[name="email1"]').value = res.data.email1;
            if (res.data.atasan1) document.querySelector('[name="atasan1"]').value = res.data.atasan1;
            if (res.data.emailAtasan1) document.querySelector('[name="emailAtasan1"]').value = res.data.emailAtasan1;

            if (res.data.atasan2) document.querySelector('[name="atasan2"]').value = res.data.atasan2;
            if (res.data.emailAtasan2) document.querySelector('[name="emailAtasan2"]').value = res.data.emailAtasan2;
            alert('Data Request ' + res.data.id + ' berhasil ditarik. Silakan lengkapi form BAST.');
          } else {
            alert('Data tidak ditemukan!');
          }
        }).catch(e => {
          btn.innerHTML = originalText;
          btn.disabled = false;
          alert('Gagal terhubung ke server.');
        });
    }

    // Navigasi Kembali ke Portal Request
    function goToRequest() {
      window.location.href = 'index.html';
    }

    // Secret Preview PDF Logic
    function previewPDF() {
      const data = {
        action: 'previewBAST',
        reqId: document.getElementById('reqIdInput').value || 'REQ-PREVIEW',
        noSurat: document.querySelector('[name="noSurat"]').value || 'BAST/XXX/MIS/PREVIEW',
        perihal: document.querySelector('[name="perihal"]').value,
        urlApp: document.querySelector('[name="urlApp"]').value,
        fungsi: document.querySelector('[name="fungsi"]').value,
        nama1: document.querySelector('[name="nama1"]').value,
        email1: document.querySelector('[name="email1"]').value,
        atasan1: document.querySelector('[name="atasan1"]').value,
        emailAtasan1: document.querySelector('[name="emailAtasan1"]').value,
        nama2: document.querySelector('[name="nama2"]').value,
        email2: document.querySelector('[name="email2"]').value,
        jabatan2: document.querySelector('[name="jabatan2"]').value,
        divisi2: document.querySelector('[name="divisi2"]').value,
        atasan2: document.querySelector('[name="atasan2"]').value,
        emailAtasan2: document.querySelector('[name="emailAtasan2"]').value
      };

      for (let key in data) {
        if (!data[key] && key !== 'reqId' && key !== 'noSurat') {
          return Swal.fire({
            icon: 'warning',
            title: 'Isian Belum Lengkap',
            text: 'Harap isi semua elemen form untuk melihat PDF Preview secara utuh.'
          });
        }
      }

      Swal.fire({
        title: 'Membangun Pratinjau...',
        text: 'Sedang meniru proses approval PDF.',
        allowOutsideClick: false,
        didOpen: () => Swal.showLoading()
      });

      fetch(GAS_API_URL, {
        method: 'POST',
        body: JSON.stringify(data)
      })
        .then(r => r.json())
        .then(res => {
          if (res.status === 'Success') {
            Swal.fire({
              icon: 'success',
              title: 'Berhasil!',
              text: res.message || 'Membuka PDF tab baru...',
              timer: 2000,
              showConfirmButton: false
            });
            setTimeout(() => {
              window.open(res.pdfUrl, '_blank');
            }, 1500);
          } else {
            Swal.fire('Gagal', res.message, 'error');
          }
        }).catch(e => {
          Swal.fire('Error Network', e.toString(), 'error');
        });
    }

    // Theme Toggle Logic
    function toggleTheme() {
      const html = document.documentElement;
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        localStorage.setItem('theme', 'light');
      } else {
        html.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      }
    }

    // Load saved theme
    if (localStorage.getItem('theme') === 'light') {
      document.documentElement.classList.remove('dark');
    }

    function handleFormSubmit(e) {
      e.preventDefault();
      const form = e.target;

      const reqId = document.getElementById('reqIdInput').value;
      if (!reqId) {
        alert('Anda belum melakukan Pencarian Data Request (ReqID). Silakan masukkan ID dikanan atas lalu klik Cari.');
        return;
      }

      const btn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');
      const loader = document.getElementById('loader');
      const statusBox = document.getElementById('statusBox');

      btn.disabled = true;
      loader.classList.remove('hidden');
      btnText.innerText = "SEDANG MEMPROSES...";
      statusBox.classList.add('hidden');

      const data = {};
      new FormData(form).forEach((value, key) => data[key] = value);
      data.action = 'createBAST';

      fetch(GAS_API_URL, {
        method: 'POST',
        body: JSON.stringify(data),
        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
      })
        .then(r => r.json())
        .then(res => {
          if (res.status === 'Success') {
            statusBox.innerText = "BERHASIL: " + res.message;
            statusBox.className = "mt-4 p-4 rounded-xl text-sm font-bold border border-emerald-500/30 bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 block shadow-sm";
            form.reset();
          } else {
            statusBox.innerText = "GAGAL: " + res.message;
            statusBox.className = "mt-4 p-4 rounded-xl text-sm font-bold border border-red-500/30 bg-red-500/10 text-red-600 dark:text-red-400 block shadow-sm";
          }
          resetButton();
        })
        .catch(err => {
          statusBox.innerText = "MEMPROSES: Namun memakan waktu (Berhasil dikirim ke Server). Silakan cek sheet.";
          statusBox.className = "mt-4 p-4 rounded-xl text-sm font-bold border border-emerald-500/30 bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 block shadow-sm";
          resetButton();
        });
    }

    function resetButton() {
      const btn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');
      const loader = document.getElementById('loader');
      btn.disabled = false;
      loader.classList.add('hidden');
      btnText.innerText = "PROSES & KIRIM APPROVAL";
    }
  </script>
</body>

</html>
