<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request System Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a',
                        'dark-lighter': '#1e293b',
                        accent: '#4f46e5'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { @apply bg-white/80 dark:bg-slate-900/70 backdrop-blur-md; }
        .theme-transition {
            transition: background-color 0.5s ease, border-color 0.5s ease, color 0.5s ease;
        }
        .loading-spinner {
            border: 3px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            border-top: 3px solid #4f46e5;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .header-link {
            transition: all 0.3s ease;
        }
        .header-link:hover {
            opacity: 0.8;
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-dark text-slate-800 dark:text-slate-200 min-h-screen theme-transition flex items-center justify-center p-4">

<div class="w-full max-w-2xl glass p-8 md:p-10 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-2xl theme-transition">
    <!-- Header -->
    <header class="flex justify-between items-start mb-6">
        <div>
            <a href="javascript:void(0)" onclick="goToPage('bast')" class="header-link inline-block" title="Buka BAST Dashboard">
                <h1 class="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-violet-600 dark:from-indigo-400 dark:to-violet-400">
                    MIS Request Portal
                </h1>
            </a>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-1 font-medium italic">Permintaan Dashboard & Sistem Informasi</p>
        </div>
        
        <button onclick="toggleTheme()" class="p-3 rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-dark-lighter shadow-sm hover:bg-slate-100 dark:hover:bg-slate-800 transition-all text-slate-600 dark:text-yellow-400">
            <svg id="sunIcon" class="w-6 h-6 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z"></path></svg>
            <svg id="moonIcon" class="w-6 h-6 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path></svg>
        </button>
    </header>

    <!-- Navigation Buttons (NEW) -->
    <div class="mb-8 flex gap-3">
        <button onclick="goToPage('monitor')" class="flex-1 py-2.5 px-4 rounded-xl border border-indigo-200 dark:border-indigo-900/50 bg-indigo-50/50 dark:bg-indigo-900/20 text-indigo-600 dark:text-indigo-400 text-xs font-bold uppercase tracking-wider hover:bg-indigo-100 dark:hover:bg-indigo-900/40 transition-all flex items-center justify-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
            Cek Progress Request
        </button>
    </div>

    <form id="requestForm" onsubmit="handleFormSubmit(event)" class="space-y-6">
        <!-- Section Identitas -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div class="space-y-1.5">
                <label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1">Unit Kerja</label>
                <input type="text" name="unit_kerja" placeholder="Contoh: Payroll" required 
                    class="w-full bg-white dark:bg-dark/50 border border-slate-200 dark:border-slate-700 rounded-xl p-3 text-slate-900 dark:text-white focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition-all shadow-sm">
            </div>
            <div class="space-y-1.5">
                <label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1">Departemen</label>
                <input type="text" name="departemen" placeholder="Contoh: Comben" required 
                    class="w-full bg-white dark:bg-dark/50 border border-slate-200 dark:border-slate-700 rounded-xl p-3 text-slate-900 dark:text-white focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition-all shadow-sm">
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div class="space-y-1.5">
                <label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1">Nama PIC</label>
                <input type="text" name="pic_name" placeholder="Nama Lengkap" required 
                    class="w-full bg-white dark:bg-dark/50 border border-slate-200 dark:border-slate-700 rounded-xl p-3 text-slate-900 dark:text-white focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition-all shadow-sm">
            </div>
            <div class="space-y-1.5">
                <label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1">Jabatan PIC</label>
                <input type="text" name="pic_position" placeholder="Contoh: Manager" required 
                    class="w-full bg-white dark:bg-dark/50 border border-slate-200 dark:border-slate-700 rounded-xl p-3 text-slate-900 dark:text-white focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition-all shadow-sm">
            </div>
        </div>

        <div class="space-y-1.5">
            <label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1">Tipe Permintaan</label>
            <select name="request_type" class="w-full bg-white dark:bg-dark/50 border border-slate-200 dark:border-slate-700 rounded-xl p-3 text-slate-900 dark:text-white focus:border-indigo-500 outline-none cursor-pointer shadow-sm">
                <option value="Dashboard" class="dark:bg-slate-800">Dashboard (Visualisasi Data)</option>
                <option value="Sistem" class="dark:bg-slate-800">Sistem Informasi / Tools Internal</option>
                <option value="Optimasi" class="dark:bg-slate-800">Maintenance Sistem</option>
            </select>
        </div>

        <div class="space-y-1.5">
            <label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1">Tujuan Permintaan</label>
            <textarea name="purpose" rows="3" placeholder="Apa dampak bisnis dari permintaan ini?" required 
                class="w-full bg-white dark:bg-dark/50 border border-slate-200 dark:border-slate-700 rounded-xl p-3 text-slate-900 dark:text-white focus:border-indigo-500 outline-none shadow-sm"></textarea>
        </div>

        <div class="space-y-3">
            <label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1">Cakupan Pengguna</label>
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                <label class="cursor-pointer">
                    <input type="radio" name="impact_scale" value="1" class="sr-only peer" checked>
                    <div class="p-3 text-center border border-slate-200 dark:border-slate-700 rounded-xl peer-checked:bg-indigo-600 peer-checked:text-white peer-checked:border-indigo-600 transition-all text-sm font-semibold dark:text-slate-400">Unit</div>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="impact_scale" value="2" class="sr-only peer">
                    <div class="p-3 text-center border border-slate-200 dark:border-slate-700 rounded-xl peer-checked:bg-indigo-600 peer-checked:text-white peer-checked:border-indigo-600 transition-all text-sm font-semibold dark:text-slate-400">Departemen</div>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="impact_scale" value="3" class="sr-only peer">
                    <div class="p-3 text-center border border-slate-200 dark:border-slate-700 rounded-xl peer-checked:bg-indigo-600 peer-checked:text-white peer-checked:border-indigo-600 transition-all text-sm font-semibold dark:text-slate-400">Multi Departemen</div>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="impact_scale" value="4" class="sr-only peer">
                    <div class="p-3 text-center border border-slate-200 dark:border-slate-700 rounded-xl peer-checked:bg-indigo-600 peer-checked:text-white peer-checked:border-indigo-600 transition-all text-sm font-semibold dark:text-slate-400">Perusahaan</div>
                </label>
            </div>
        </div>

        <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-500/20 dark:shadow-indigo-900/20 transform active:scale-[0.98] transition-all flex items-center justify-center gap-3 mt-4">
            <span id="btnText">KIRIM REQUEST</span>
            <div id="loader" class="loading-spinner hidden"></div>
        </button>

        <div id="statusBox" class="hidden p-4 rounded-2xl text-sm font-bold border text-center animate-pulse shadow-sm"></div>
    </form>

    <footer class="mt-10 text-center text-slate-400 dark:text-slate-600 text-[10px] font-bold uppercase tracking-widest">
        MIS Portal &bull; Digital Request System &copy; 2026
    </footer>
</div>

<script>
    // Fungsi navigasi umum
    function goToPage(pageName) {
        if (typeof google !== 'undefined') {
            google.script.run.withSuccessHandler(function(url) {
                window.open(url + '?page=' + pageName, '_top');
            }).getServiceUrl();
        } else {
            console.log("Navigasi ke: ?page=" + pageName);
        }
    }

    // Theme Toggle Logic
    function toggleTheme() {
        const html = document.documentElement;
        if (html.classList.contains('dark')) {
            html.classList.remove('dark');
            localStorage.setItem('theme', 'light');
        } else {
            html.classList.add('dark');
            localStorage.setItem('theme', 'dark');
        }
    }

    if (localStorage.getItem('theme') === 'light') {
        document.documentElement.classList.remove('dark');
    }

    function handleFormSubmit(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const loader = document.getElementById('loader');
        const statusBox = document.getElementById('statusBox');
        
        btn.disabled = true;
        loader.classList.remove('hidden');
        btnText.innerText = "SEDANG MENGIRIM...";
        statusBox.classList.add('hidden');
        
        const data = {};
        new FormData(e.target).forEach((value, key) => data[key] = value);

        if (typeof google !== 'undefined') {
            google.script.run
                .withSuccessHandler(msg => {
                    statusBox.innerText = msg;
                    statusBox.className = "mt-6 p-4 rounded-2xl text-sm font-bold border border-emerald-500/30 bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 block";
                    e.target.reset();
                    resetButton();
                })
                .withFailureHandler(err => {
                    statusBox.innerText = "GAGAL: " + err;
                    statusBox.className = "mt-6 p-4 rounded-2xl text-sm font-bold border border-red-500/30 bg-red-500/10 text-red-600 dark:text-red-400 block";
                    resetButton();
                })
                .processForm(data);
        } else {
            setTimeout(() => {
                statusBox.innerText = "BERHASIL (Testing Mode)";
                statusBox.className = "mt-6 p-4 rounded-2xl text-sm font-bold border border-emerald-500/30 bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 block";
                resetButton();
            }, 1000);
        }
    }

    function resetButton() {
        const btn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const loader = document.getElementById('loader');
        btn.disabled = false;
        loader.classList.add('hidden');
        btnText.innerText = "KIRIM REQUEST KE MIS";
    }
</script>
</body>
</html>
